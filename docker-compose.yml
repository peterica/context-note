services:
  context-note:
    build:
      context: ./dev
      dockerfile: Dockerfile
    container_name: context-note-${PROJECT_NAME:-default}
    ports:
      - "${PORT:-8080}:3000"
    volumes:
      - ${NOTE_PATH:-./note}:/data/note
    environment:
      - NOTE_ROOT=/data/note
    restart: unless-stopped
